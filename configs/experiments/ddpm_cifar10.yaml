experiment:
  name: ddpm_cifar10_seed0
  seed: 0
  output_dir: outputs/runs/ddpm_cifar10_seed0

dataset:
  name: cifar10
  data_dir: data
  image_size: 32
  channels: 3
  train_percent: 100.0
  num_workers: 4
  pin_memory: true

model:
  type: ddpm
  architecture: diffusers_unet
  in_channels: 3
  out_channels: 3
  block_out_channels: [128, 128, 256, 256]
  down_block_types:
    - DownBlock2D
    - DownBlock2D
    - AttnDownBlock2D
    - DownBlock2D
  up_block_types:
    - UpBlock2D
    - AttnUpBlock2D
    - UpBlock2D
    - UpBlock2D
  layers_per_block: 2

diffusion:
  num_train_timesteps: 1000
  beta_schedule: linear
  prediction_type: epsilon

training:
  batch_size: 128
  num_steps: 100000
  learning_rate: 0.0002
  weight_decay: 0.0
  grad_clip_norm: 1.0
  mixed_precision: true
  ema_decay: 0.999
  log_every: 100
  validate_every: 5000
  sample_every: 5000
  checkpoint_every: 10000

sampling:
  num_steps: 100
  num_samples: 64
  batch_size: 64

wandb:
  enabled: true
  project: stat542-diffusion-comparison
  entity: sswitz-stat542-final-project
  tags:
    - ddpm
    - cifar10
    - mvp
